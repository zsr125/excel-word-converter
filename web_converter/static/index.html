<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文件格式转换器 · Excel/Numbers → Word</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --radius: 12px;
      --radius-lg: 18px;
      --shadow: 0 2px 12px rgba(0,0,0,.06);
      --shadow-hover: 0 8px 24px rgba(0,0,0,.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease;
    }
    .card:hover { box-shadow: var(--shadow-hover); }
    .dropzone {
      display: block;
      border: 2px dashed rgba(0,0,0,.12);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      min-height: 160px;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(0,113,227,.04);
    }
    .dropzone-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .dropzone .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #e8e8ed 0%, #d1d1d6 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .dropzone .title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .dropzone .hint {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .dropzone input { display: none; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 980px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, background .2s;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      margin-top: 24px;
      width: 100%;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.875rem;
    }
    .status.error { background: rgba(255,59,48,.1); color: #c00; }
    .status.success { background: rgba(52,199,89,.1); color: #1a7f37; }
    .status.hidden { display: none; }
    .tips {
      margin-top: 32px;
      padding: 20px;
      background: rgba(0,0,0,.03);
      border-radius: var(--radius);
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .tips strong { color: var(--text); }
    .tips ul { margin: 8px 0 0 16px; }
    .tips li { margin: 4px 0; }
    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>文件格式转换器</h1>
      <p class="sub">Excel / Numbers → 分级大纲 Word 文档</p>
    </header>
    <div class="card">
      <form id="form">
        <label class="dropzone" id="dropzone">
          <input type="file" name="file" id="file" accept=".xlsx,.numbers">
          <span class="dropzone-inner">
            <span class="icon">📄</span>
            <span class="title">拖拽文件到此处，或点击选择</span>
            <span class="hint">支持 .xlsx（Excel）、.numbers（Numbers），单文件 ≤ 100MB</span>
          </span>
        </label>
        <button type="submit" class="btn btn-primary" id="submit" disabled>开始转换</button>
      </form>
      <div class="status hidden" id="status"></div>
    </div>
    <div class="tips">
      <strong>转换规则</strong>
      <ul>
        <li>每个 Sheet → 一级大纲（一、二、三…）</li>
        <li>每行第一列 → 二级大纲（（一）（二）…）</li>
        <li>每行其余列 → 三级内容（①②③…）</li>
        <li>输出为纯文字分级大纲，无表格</li>
      </ul>
    </div>
    <footer>本地运行或部署后可永久使用 · 文件在服务器端仅作临时转换，不予保存</footer>
  </div>
  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file');
    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submit');
    const status = document.getElementById('status');

    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status ' + (type || '');
      status.classList.remove('hidden');
    }

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const f = e.dataTransfer?.files?.[0];
      if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.numbers'))) {
        fileInput.files = e.dataTransfer.files;
        submitBtn.disabled = false;
      }
    });
    fileInput.addEventListener('change', () => { submitBtn.disabled = !fileInput.files?.length; });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (!fileInput.files?.length) return;
      submitBtn.disabled = true;
      setStatus('正在转换，请稍候…', '');
      const fd = new FormData();
      fd.append('file', fileInput.files[0]);
      try {
        const res = await fetch('/api/convert', { method: 'POST', body: fd });
        const blob = await res.blob();
        if (!res.ok) {
          const t = await blob.text();
          let m = '转换失败';
          try { const j = JSON.parse(t); m = j.msg || m; } catch (_) {}
          setStatus(m, 'error');
          submitBtn.disabled = false;
          return;
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (fileInput.files[0].name.replace(/\.[^.]+$/, '') || '手册') + '.docx';
        a.click();
        URL.revokeObjectURL(a.href);
        setStatus('转换完成，已开始下载', 'success');
      } catch (err) {
        setStatus('网络错误：' + (err.message || '请检查服务是否运行'), 'error');
      }
      submitBtn.disabled = false;
    });
  </script>
</body>
</html>
